on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Jalankan untuk mendapatkan known-host server manual: ssh-keyscan -t rsa,ecdsa,ed25519 <SSH_HOST> dan tambahkan ke known_hosts
      - name: Add known_hosts (host key)
        run: |
          mkdir -p ~/.ssh
          echo "ruangai-staging.appdata.id ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK+1nU9zPceEObzTj42oaYX9gVDBRBxiAJipk8kfaCIo" >> ~/.ssh/known_hosts

      # - name: Sanity check - list keys loaded
      #   run: ssh-add -l

      # - name: Sanity check - try SSH to server (no command)
      #   run: |
      #     ssh -vvv -o StrictHostKeyChecking=yes -p "${{ secrets.SSH_PORT }}" \
      #       "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" true

      - name: Deploy (vendor/bin/dep)
        run: php vendor/bin/dep deploy production --no-interaction

