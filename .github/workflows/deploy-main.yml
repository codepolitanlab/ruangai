name: Deploy Project CI4

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, intl, curl, zip, gd
        tools: composer

    - name: Install Dependencies
      run: composer install --no-dev --optimize-autoloader

    # Step Tambahan: Inisialisasi SSH Agent secara manual
    - name: Install SSH Key
      uses: shivammathur/setup-php@v2 # Re-use setup untuk tool SSH
    - run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-agent -a /tmp/ssh_agent.sock > /dev/null
        echo "SSH_AUTH_SOCK=/tmp/ssh_agent.sock" >> $GITHUB_ENV
        ssh-add ~/.ssh/id_ed25519

    - name: Deploy with Deployer
      uses: deployphp/action@v1
      with:
        # Kita tetap masukkan ini sebagai fallback
        private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        known-hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
        # Pastikan "production" tertulis eksplisit
        dep: deploy production -vvv